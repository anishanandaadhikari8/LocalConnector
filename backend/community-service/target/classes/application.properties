server.port=8082
spring.datasource.url=jdbc:h2:file:./.data/localconnector;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.h2.console.enabled=true

# App auth
app.auth.dev-enabled=true
app.jwt.secret=this-is-a-very-long-secret-key-for-jwt-signing-2024

# Logging
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=OFF

